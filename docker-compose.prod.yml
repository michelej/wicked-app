version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: wicked-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-wicked_db}
      - TZ=${TZ:-UTC}
    networks:
      - wicked-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    image: ghcr.io/michelej/wicked-backend:latest
    container_name: wicked-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DB_NAME=${MONGO_INITDB_DATABASE:-wicked_db}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - TZ=${TZ:-UTC}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wicked-network
    healthcheck:
      test: curl -f http://localhost:8000/docs || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue.js Frontend
  frontend:
    image: ghcr.io/michelej/wicked-frontend:latest
    container_name: wicked-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:8000}
      - TZ=${TZ:-UTC}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wicked-network

networks:
  wicked-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
